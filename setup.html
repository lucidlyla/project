<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 설정 - 기획 진행 현황</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f5f5f5; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .setup-box { background:#fff; border-radius:12px; padding:40px 36px; width:420px; box-shadow:0 8px 32px rgba(0,0,0,.1); }
  h2 { margin-bottom:8px; font-size:20px; }
  p { color:#888; font-size:13px; margin-bottom:24px; line-height:1.5; }
  label { display:block; font-size:12px; font-weight:600; color:#666; margin-bottom:4px; margin-top:16px; }
  input { width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; outline:none; }
  input:focus { border-color:#4a7c59; }
  button { width:100%; padding:12px; background:#4a7c59; color:#fff; border:none; border-radius:8px; font-size:15px; cursor:pointer; font-weight:600; margin-top:24px; }
  button:hover { background:#3d6b4b; }
  .msg { margin-top:12px; padding:10px; border-radius:6px; font-size:13px; }
  .msg.ok { background:#e8f5e9; color:#2e7d32; }
  .msg.err { background:#fdecea; color:#e74c3c; }
  .note { margin-top:16px; font-size:11px; color:#aaa; line-height:1.5; }
</style>
</head>
<body>
<div class="setup-box">
  <h2>초기 비밀번호 설정</h2>
  <p>최초 1회만 실행합니다. 관리자 비밀번호와 편집자 비밀번호를 설정하세요.</p>

  <label>Apps Script URL</label>
  <input id="url" type="text" placeholder="https://script.google.com/macros/s/.../exec" />

  <label>관리자 비밀번호</label>
  <input id="adminPw" type="password" placeholder="관리자용 비밀번호" />

  <label>편집자 비밀번호</label>
  <input id="editorPw" type="password" placeholder="편집자 공용 비밀번호" />

  <button onclick="initSetup()">설정 완료</button>
  <div id="msg"></div>

  <div class="note">
    ※ 비밀번호는 SHA-256 해시로 변환되어 저장됩니다.<br/>
    ※ 설정 후 이 페이지는 더 이상 사용하지 않아도 됩니다.<br/>
    ※ 비밀번호 변경은 관리자 로그인 후 설정에서 가능합니다.
  </div>
</div>

<script>
async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function initSetup() {
  const url = document.getElementById('url').value.trim();
  const adminPw = document.getElementById('adminPw').value;
  const editorPw = document.getElementById('editorPw').value;
  const msgEl = document.getElementById('msg');

  if(!url) { msgEl.className='msg err'; msgEl.textContent='Apps Script URL을 입력하세요'; return; }
  if(!adminPw) { msgEl.className='msg err'; msgEl.textContent='관리자 비밀번호를 입력하세요'; return; }
  if(!editorPw) { msgEl.className='msg err'; msgEl.textContent='편집자 비밀번호를 입력하세요'; return; }
  if(adminPw === editorPw) { msgEl.className='msg err'; msgEl.textContent='관리자와 편집자 비밀번호는 달라야 합니다'; return; }

  msgEl.className='msg'; msgEl.textContent='설정 중...';

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {"Content-Type":"text/plain"},
      body: JSON.stringify({
        action: "initPasswords",
        data: {
          adminPwHash: await sha256(adminPw),
          editorPwHash: await sha256(editorPw)
        }
      })
    });
    const json = await res.json();
    if(json.success) {
      msgEl.className='msg ok';
      msgEl.textContent='설정 완료! 이제 메인 페이지에서 로그인하세요.';
    } else {
      msgEl.className='msg err';
      msgEl.textContent='오류: ' + (json.error || '알 수 없는 오류');
    }
  } catch(e) {
    msgEl.className='msg err';
    msgEl.textContent='연결 오류: ' + e.message;
  }
}
</script>
</body>
</html>
