<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기 설정 - 전사 기획 현황</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e2e8f0;
  }
  .setup-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 48px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  }
  .setup-card h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #f8fafc;
  }
  .setup-card p {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #f8fafc;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: #3b82f6; }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #2563eb; }
  .warning {
    background: #7c2d12;
    border: 1px solid #9a3412;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #fed7aa;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .already-set {
    text-align: center;
    padding: 24px;
  }
  .already-set a {
    color: #3b82f6;
    text-decoration: none;
  }
  .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
  .msg.success { display: block; background: #064e3b; border: 1px solid #065f46; color: #6ee7b7; }
  .msg.error { display: block; background: #7c2d12; border: 1px solid #9a3412; color: #fed7aa; }
</style>
</head>
<body>
<div class="setup-card" id="setupForm">
  <h1>초기 비밀번호 설정</h1>
  <p>전사 기획 현황 관리 시스템의 관리자 비밀번호를 설정합니다. 이 페이지는 최초 1회만 사용 가능합니다.</p>
  <div class="warning">이 비밀번호는 관리자 권한으로 사용됩니다. 안전한 비밀번호를 설정해 주세요.</div>
  <div class="form-group">
    <label>관리자 비밀번호</label>
    <input type="password" id="pw1" placeholder="비밀번호 입력">
  </div>
  <div class="form-group">
    <label>비밀번호 확인</label>
    <input type="password" id="pw2" placeholder="비밀번호 재입력">
  </div>
  <button class="btn-primary" onclick="setupPassword()">설정 완료</button>
  <div id="msg" class="msg"></div>
</div>

<div class="setup-card already-set" id="alreadySet" style="display:none;">
  <h1>설정 완료됨</h1>
  <p>관리자 비밀번호가 이미 설정되어 있습니다.</p>
  <a href="index.html">메인 페이지로 이동 →</a>
</div>

<script>
async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function init() {
  const existing = localStorage.getItem('admin_pw_hash');
  if (existing) {
    document.getElementById('setupForm').style.display = 'none';
    document.getElementById('alreadySet').style.display = 'block';
  }
}

async function setupPassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msgEl = document.getElementById('msg');

  if (!pw1 || pw1.length < 4) {
    msgEl.className = 'msg error';
    msgEl.textContent = '비밀번호는 4자 이상이어야 합니다.';
    return;
  }
  if (pw1 !== pw2) {
    msgEl.className = 'msg error';
    msgEl.textContent = '비밀번호가 일치하지 않습니다.';
    return;
  }

  const hash = await sha256(pw1);
  localStorage.setItem('admin_pw_hash', hash);
  localStorage.setItem('setup_done', 'true');

  msgEl.className = 'msg success';
  msgEl.textContent = '설정 완료! 메인 페이지로 이동합니다...';
  setTimeout(() => { window.location.href = 'index.html'; }, 1500);
}

init();
</script>
</body>
</html>
