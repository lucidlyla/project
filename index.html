<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전사 기획 현황</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: #475569;
  --text: #f8fafc;
  --text2: #94a3b8;
  --text3: #64748b;
  --blue: #3b82f6;
  --blue-hover: #2563eb;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Login */
.login-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 16px;
  padding: 48px;
  width: 100%; max-width: 400px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.4);
}
.login-card h1 { font-size: 22px; margin-bottom: 6px; }
.login-card .sub { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
.login-tabs { display: flex; gap: 0; margin-bottom: 24px; }
.login-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600;
  cursor: pointer; border-bottom: 2px solid var(--surface2); color: var(--text3);
  transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
}
.login-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Form elements */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--surface2);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); }
.form-group select { cursor: pointer; }
.form-group textarea { resize: vertical; min-height: 60px; }

.btn {
  padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: var(--blue-hover); }
.btn-full { width: 100%; justify-content: center; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--surface2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #dc2626; }

.msg { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; }
.msg.error { display: block; background: rgba(239,68,68,0.15); color: #fca5a5; }
.msg.success { display: block; background: rgba(16,185,129,0.15); color: #6ee7b7; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--surface2);
  padding: 0 32px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-left h1 { font-size: 18px; font-weight: 700; }
.header-left .badge {
  background: var(--blue);
  color: white;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.header-right .user-badge {
  background: var(--surface2);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  color: var(--text2);
}

/* Toolbar */
.toolbar {
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  flex-wrap: wrap;
}
.toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.search-box {
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 14px;
  width: 240px;
  outline: none;
}
.search-box:focus { border-color: var(--blue); }
.filter-select {
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  cursor: pointer;
}

/* Stats */
.stats-bar {
  padding: 0 32px 16px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.stat-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* Kanban */
.kanban {
  display: flex;
  gap: 16px;
  padding: 0 32px 32px;
  overflow-x: auto;
  min-height: calc(100vh - 220px);
}
.kanban-col {
  min-width: 280px;
  max-width: 320px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 14px;
  font-weight: 700;
}
.kanban-col-header .count {
  background: var(--surface2);
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}
.kanban-col-body {
  flex: 1;
  background: rgba(30,41,59,0.4);
  border: 1px solid var(--surface2);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 100px;
}
.kanban-card {
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 8px;
  padding: 14px;
  cursor: grab;
  transition: all 0.15s;
  position: relative;
}
.kanban-card:hover { border-color: var(--blue); transform: translateY(-1px); }
.kanban-card.dragging { opacity: 0.5; }
.kanban-card .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
.kanban-card .card-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 12px; color: var(--text2); }
.kanban-card .card-tag {
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}
.kanban-card .card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: none;
  gap: 4px;
}
.kanban-card:hover .card-actions { display: flex; }
.card-action-btn {
  width: 24px; height: 24px;
  background: var(--bg);
  border: 1px solid var(--surface2);
  border-radius: 4px;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.card-action-btn:hover { background: var(--surface2); color: var(--text); }

/* Drop indicator */
.kanban-col-body.drag-over { background: rgba(59,130,246,0.08); border-color: var(--blue); }

/* Stage colors */
.stage-기획중 { border-left: 3px solid var(--yellow); }
.stage-원고작업 { border-left: 3px solid var(--cyan); }
.stage-편집 { border-left: 3px solid var(--blue); }
.stage-디자인 { border-left: 3px solid var(--purple); }
.stage-인쇄 { border-left: 3px solid var(--pink); }
.stage-출간 { border-left: 3px solid var(--green); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  display: none;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 16px;
  padding: 32px;
  width: 100%; max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.modal h2 { font-size: 18px; margin-bottom: 24px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* Settings panel */
.settings-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 420px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--surface2);
  z-index: 500;
  transition: right 0.3s;
  display: flex;
  flex-direction: column;
}
.settings-panel.open { right: 0; }
.settings-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--surface2);
  display: flex; align-items: center; justify-content: space-between;
}
.settings-header h2 { font-size: 17px; }
.settings-body { flex: 1; overflow-y: auto; padding: 24px; }
.settings-section { margin-bottom: 28px; }
.settings-section h3 { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.editor-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; font-size: 14px;
}
.editor-item button {
  background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px;
}
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  z-index: 499; display: none;
}
.settings-overlay.show { display: block; }

/* Sync indicator */
.sync-status {
  font-size: 12px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
}
.sync-dot.offline { background: var(--yellow); }

/* Responsive */
@media (max-width: 768px) {
  .kanban { padding: 0 16px 16px; }
  .kanban-col { min-width: 260px; }
  .header { padding: 0 16px; }
  .toolbar, .stats-bar { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h1>전사 기획 현황</h1>
    <p class="sub">출판 기획 파이프라인 관리 시스템</p>
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('admin')">관리자</button>
      <button class="login-tab" onclick="switchLoginTab('editor')">편집자</button>
    </div>
    <div id="adminLoginForm">
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">로그인</button>
    </div>
    <div id="editorLoginForm" style="display:none;">
      <div class="form-group">
        <label>이름 선택</label>
        <select id="editorSelect"><option value="">편집자를 선택하세요</option></select>
      </div>
      <button class="btn btn-primary btn-full" onclick="doEditorLogin()">로그인</button>
    </div>
    <div id="loginMsg" class="msg"></div>
    <div style="text-align:center; margin-top:20px;">
      <a href="setup.html" style="color:var(--text3); font-size:12px; text-decoration:none;">초기 설정</a>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>전사 기획 현황</h1>
      <span class="badge" id="totalBadge">0건</span>
    </div>
    <div class="header-right">
      <div class="sync-status">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">로컬</span>
      </div>
      <span class="user-badge" id="userBadge">관리자</span>
      <button class="btn btn-ghost btn-sm" onclick="openSettings()" id="settingsBtn">설정</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input class="search-box" id="searchBox" placeholder="검색..." oninput="renderBoard()">
      <select class="filter-select" id="filterEditor" onchange="renderBoard()">
        <option value="">전체 편집자</option>
      </select>
      <select class="filter-select" id="filterGenre" onchange="renderBoard()">
        <option value="">전체 장르</option>
      </select>
    </div>
    <div>
      <button class="btn btn-primary btn-sm" id="addBtn" onclick="openAddModal()">+ 기획 추가</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Kanban Board -->
  <div class="kanban" id="kanbanBoard"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h2 id="modalTitle">기획 추가</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="projTitle" placeholder="기획 제목">
    </div>
    <div class="form-group">
      <label>저자</label>
      <input type="text" id="projAuthor" placeholder="저자명">
    </div>
    <div class="form-group">
      <label>담당 편집자</label>
      <select id="projEditor"><option value="">미지정</option></select>
    </div>
    <div class="form-group">
      <label>단계</label>
      <select id="projStage">
        <option>기획중</option><option>원고작업</option><option>편집</option>
        <option>디자인</option><option>인쇄</option><option>출간</option>
      </select>
    </div>
    <div class="form-group">
      <label>장르</label>
      <input type="text" id="projGenre" placeholder="예: 소설, 에세이, 경제경영">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="projMemo" placeholder="메모"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>설정</h2>
    <button class="btn btn-ghost btn-sm" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <h3>편집자 관리</h3>
      <div id="editorList"></div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="text" id="newEditorName" placeholder="편집자 이름" style="flex:1; padding:8px 12px; background:var(--bg); border:1px solid var(--surface2); border-radius:6px; color:var(--text); font-size:14px; outline:none;">
        <button class="btn btn-primary btn-sm" onclick="addEditor()">추가</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>비밀번호 변경</h3>
      <div class="form-group">
        <label>현재 비밀번호</label>
        <input type="password" id="curPw">
      </div>
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" id="newPw">
      </div>
      <div class="form-group">
        <label>새 비밀번호 확인</label>
        <input type="password" id="newPw2">
      </div>
      <button class="btn btn-primary btn-sm" onclick="changePassword()">변경</button>
      <div id="pwMsg" class="msg" style="margin-top:8px;"></div>
    </div>
    <div class="settings-section">
      <h3>Google Sheets 연동</h3>
      <div class="form-group">
        <label>Apps Script 배포 URL</label>
        <input type="text" id="appsScriptUrl" placeholder="https://script.google.com/macros/s/...">
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="saveAppsScriptUrl()">저장</button>
        <button class="btn btn-ghost btn-sm" onclick="syncToSheet()">지금 동기화</button>
      </div>
      <div id="syncMsg" class="msg" style="margin-top:8px;"></div>
    </div>
    <div class="settings-section">
      <h3>데이터 관리</h3>
      <button class="btn btn-ghost btn-sm" onclick="exportData()">JSON 내보내기</button>
      <button class="btn btn-ghost btn-sm" style="margin-left:8px;" onclick="document.getElementById('importFile').click()">JSON 가져오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
    </div>
  </div>
</div>

<script>
// ==================== STATE ====================
const STAGES = ['기획중', '원고작업', '편집', '디자인', '인쇄', '출간'];
const STAGE_COLORS = { '기획중': '#f59e0b', '원고작업': '#06b6d4', '편집': '#3b82f6', '디자인': '#8b5cf6', '인쇄': '#ec4899', '출간': '#10b981' };

let state = {
  role: null,
  editorName: null,
  projects: [],
  editors: [],
  appsScriptUrl: ''
};

async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function switchLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('adminLoginForm').style.display = tab === 'admin' ? 'block' : 'none';
  document.getElementById('editorLoginForm').style.display = tab === 'editor' ? 'block' : 'none';
  document.getElementById('loginMsg').className = 'msg';
  if (tab === 'editor') populateEditorSelect();
}

function populateEditorSelect() {
  const sel = document.getElementById('editorSelect');
  sel.innerHTML = '<option value="">편집자를 선택하세요</option>';
  state.editors.forEach(e => {
    sel.innerHTML += `<option value="${e}">${e}</option>`;
  });
}

async function doLogin() {
  const pw = document.getElementById('loginPw').value;
  const stored = localStorage.getItem('admin_pw_hash');
  if (!stored) {
    showLoginMsg('error', '초기 설정이 필요합니다. 아래 링크를 클릭하세요.');
    return;
  }
  const hash = await sha256(pw);
  if (hash === stored) {
    state.role = 'admin';
    sessionStorage.setItem('role', 'admin');
    showApp();
  } else {
    showLoginMsg('error', '비밀번호가 틀렸습니다.');
  }
}

function doEditorLogin() {
  const name = document.getElementById('editorSelect').value;
  if (!name) { showLoginMsg('error', '편집자를 선택하세요.'); return; }
  state.role = 'editor';
  state.editorName = name;
  sessionStorage.setItem('role', 'editor');
  sessionStorage.setItem('editorName', name);
  showApp();
}

function doLogout() {
  sessionStorage.clear();
  state.role = null;
  state.editorName = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginPw').value = '';
}

function showLoginMsg(type, text) {
  const el = document.getElementById('loginMsg');
  el.className = `msg ${type}`;
  el.textContent = text;
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const isAdmin = state.role === 'admin';
  document.getElementById('userBadge').textContent = isAdmin ? '관리자' : state.editorName;
  document.getElementById('settingsBtn').style.display = isAdmin ? '' : 'none';
  document.getElementById('addBtn').style.display = isAdmin ? '' : 'none';
  renderBoard();
  updateFilters();
}

function loadData() {
  try {
    state.projects = JSON.parse(localStorage.getItem('projects') || '[]');
    state.editors = JSON.parse(localStorage.getItem('editors') || '[]');
    state.appsScriptUrl = localStorage.getItem('appsScriptUrl') || '';
  } catch (e) {
    state.projects = [];
    state.editors = [];
  }
}

function saveData() {
  localStorage.setItem('projects', JSON.stringify(state.projects));
  localStorage.setItem('editors', JSON.stringify(state.editors));
  if (state.appsScriptUrl) localStorage.setItem('appsScriptUrl', state.appsScriptUrl);
}

function genId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

function renderBoard() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const filterEd = document.getElementById('filterEditor').value;
  const filterGen = document.getElementById('filterGenre').value;

  let filtered = state.projects.filter(p => {
    if (search && !p.title.toLowerCase().includes(search) && !p.author.toLowerCase().includes(search)) return false;
    if (filterEd && p.editor !== filterEd) return false;
    if (filterGen && p.genre !== filterGen) return false;
    if (state.role === 'editor' && p.editor !== state.editorName) return false;
    return true;
  });

  const board = document.getElementById('kanbanBoard');
  board.innerHTML = '';

  STAGES.forEach(stage => {
    const items = filtered.filter(p => p.stage === stage);
    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = `
      <div class="kanban-col-header">
        <span style="display:flex;align-items:center;gap:8px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${STAGE_COLORS[stage]}"></span>
          ${stage}
        </span>
        <span class="count">${items.length}</span>
      </div>
      <div class="kanban-col-body" data-stage="${stage}"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        ${items.map(p => renderCard(p)).join('')}
      </div>
    `;
    board.appendChild(col);
  });

  updateStats(filtered);
  document.getElementById('totalBadge').textContent = state.projects.length + '건';
}

function renderCard(p) {
  const isAdmin = state.role === 'admin';
  const canEdit = isAdmin || (state.role === 'editor' && p.editor === state.editorName);
  return `
    <div class="kanban-card stage-${p.stage}" draggable="${canEdit}"
      ondragstart="onDragStart(event, '${p.id}')" data-id="${p.id}">
      ${canEdit ? `<div class="card-actions">
        <button class="card-action-btn" onclick="openEditModal('${p.id}')" title="수정">✎</button>
        ${isAdmin ? `<button class="card-action-btn" onclick="deleteProject('${p.id}')" title="삭제">✕</button>` : ''}
      </div>` : ''}
      <div class="card-title">${esc(p.title)}</div>
      <div class="card-meta">
        <span class="card-tag">✍ ${esc(p.author)}</span>
        ${p.editor ? `<span class="card-tag">📋 ${esc(p.editor)}</span>` : ''}
        ${p.genre ? `<span class="card-tag">${esc(p.genre)}</span>` : ''}
      </div>
      ${p.memo ? `<div style="font-size:12px;color:var(--text3);margin-top:8px;line-height:1.4;">${esc(p.memo)}</div>` : ''}
    </div>
  `;
}

function updateStats(filtered) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = STAGES.map(stage => {
    const count = filtered.filter(p => p.stage === stage).length;
    return `<div class="stat-chip"><span class="stat-dot" style="background:${STAGE_COLORS[stage]}"></span>${stage} <strong>${count}</strong></div>`;
  }).join('');
}

function updateFilters() {
  const edSel = document.getElementById('filterEditor');
  const genSel = document.getElementById('filterGenre');
  const curEd = edSel.value;
  const curGen = genSel.value;

  edSel.innerHTML = '<option value="">전체 편집자</option>';
  state.editors.forEach(e => {
    edSel.innerHTML += `<option value="${e}" ${e === curEd ? 'selected' : ''}>${e}</option>`;
  });

  const genres = [...new Set(state.projects.map(p => p.genre).filter(Boolean))];
  genSel.innerHTML = '<option value="">전체 장르</option>';
  genres.forEach(g => {
    genSel.innerHTML += `<option value="${g}" ${g === curGen ? 'selected' : ''}>${g}</option>`;
  });
}

let dragId = null;
function onDragStart(e, id) { dragId = id; e.target.classList.add('dragging'); }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const newStage = e.currentTarget.dataset.stage;
  const proj = state.projects.find(p => p.id === dragId);
  if (proj) {
    proj.stage = newStage;
    proj.updatedAt = new Date().toISOString();
    saveData();
    renderBoard();
    syncIfConnected();
  }
  dragId = null;
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '기획 추가';
  document.getElementById('editId').value = '';
  document.getElementById('projTitle').value = '';
  document.getElementById('projAuthor').value = '';
  document.getElementById('projGenre').value = '';
  document.getElementById('projMemo').value = '';
  document.getElementById('projStage').value = '기획중';
  populateProjectEditorSelect('');
  document.getElementById('projectModal').classList.add('show');
}

function openEditModal(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '기획 수정';
  document.getElementById('editId').value = id;
  document.getElementById('projTitle').value = p.title;
  document.getElementById('projAuthor').value = p.author;
  document.getElementById('projGenre').value = p.genre || '';
  document.getElementById('projMemo').value = p.memo || '';
  document.getElementById('projStage').value = p.stage;
  populateProjectEditorSelect(p.editor || '');
  const isAdmin = state.role === 'admin';
  document.getElementById('projEditor').disabled = !isAdmin;
  document.getElementById('projectModal').classList.add('show');
}

function populateProjectEditorSelect(val) {
  const sel = document.getElementById('projEditor');
  sel.innerHTML = '<option value="">미지정</option>';
  state.editors.forEach(e => {
    sel.innerHTML += `<option value="${e}" ${e === val ? 'selected' : ''}>${e}</option>`;
  });
  sel.disabled = false;
}

function closeModal() { document.getElementById('projectModal').classList.remove('show'); }

function saveProject() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('projTitle').value.trim();
  const author = document.getElementById('projAuthor').value.trim();
  const editor = document.getElementById('projEditor').value;
  const stage = document.getElementById('projStage').value;
  const genre = document.getElementById('projGenre').value.trim();
  const memo = document.getElementById('projMemo').value.trim();

  if (!title) { alert('제목을 입력하세요.'); return; }
  if (!author) { alert('저자를 입력하세요.'); return; }

  if (id) {
    const p = state.projects.find(x => x.id === id);
    if (p) {
      p.title = title;
      p.author = author;
      if (state.role === 'admin') p.editor = editor;
      p.stage = stage;
      p.genre = genre;
      p.memo = memo;
      p.updatedAt = new Date().toISOString();
    }
  } else {
    state.projects.push({
      id: genId(), title, author, editor, stage, genre, memo,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    });
  }

  saveData();
  closeModal();
  renderBoard();
  updateFilters();
  syncIfConnected();
}

function deleteProject(id) {
  if (!confirm('이 기획을 삭제하시겠습니까?')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  saveData();
  renderBoard();
  updateFilters();
  syncIfConnected();
}

function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('settingsOverlay').classList.add('show');
  renderEditorList();
  document.getElementById('appsScriptUrl').value = state.appsScriptUrl;
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('settingsOverlay').classList.remove('show');
}

function renderEditorList() {
  const el = document.getElementById('editorList');
  if (state.editors.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px;">등록된 편집자가 없습니다.</div>';
    return;
  }
  el.innerHTML = state.editors.map(e => `
    <div class="editor-item">
      <span>${esc(e)}</span>
      <button onclick="removeEditor('${esc(e)}')" title="삭제">✕</button>
    </div>
  `).join('');
}

function addEditor() {
  const name = document.getElementById('newEditorName').value.trim();
  if (!name) return;
  if (state.editors.includes(name)) { alert('이미 등록된 편집자입니다.'); return; }
  state.editors.push(name);
  saveData();
  document.getElementById('newEditorName').value = '';
  renderEditorList();
  updateFilters();
  syncIfConnected();
}

function removeEditor(name) {
  if (!confirm(`'${name}' 편집자를 삭제하시겠습니까?`)) return;
  state.editors = state.editors.filter(e => e !== name);
  saveData();
  renderEditorList();
  updateFilters();
  syncIfConnected();
}

async function changePassword() {
  const cur = document.getElementById('curPw').value;
  const nw = document.getElementById('newPw').value;
  const nw2 = document.getElementById('newPw2').value;
  const msgEl = document.getElementById('pwMsg');

  const curHash = await sha256(cur);
  if (curHash !== localStorage.getItem('admin_pw_hash')) {
    msgEl.className = 'msg error'; msgEl.textContent = '현재 비밀번호가 틀렸습니다.'; return;
  }
  if (nw.length < 4) {
    msgEl.className = 'msg error'; msgEl.textContent = '4자 이상 입력하세요.'; return;
  }
  if (nw !== nw2) {
    msgEl.className = 'msg error'; msgEl.textContent = '새 비밀번호가 일치하지 않습니다.'; return;
  }
  const newHash = await sha256(nw);
  localStorage.setItem('admin_pw_hash', newHash);
  msgEl.className = 'msg success'; msgEl.textContent = '비밀번호가 변경되었습니다.';
  document.getElementById('curPw').value = '';
  document.getElementById('newPw').value = '';
  document.getElementById('newPw2').value = '';
}

function saveAppsScriptUrl() {
  state.appsScriptUrl = document.getElementById('appsScriptUrl').value.trim();
  localStorage.setItem('appsScriptUrl', state.appsScriptUrl);
  const msgEl = document.getElementById('syncMsg');
  if (state.appsScriptUrl) {
    msgEl.className = 'msg success'; msgEl.textContent = 'URL이 저장되었습니다.';
    document.getElementById('syncDot').classList.remove('offline');
    document.getElementById('syncText').textContent = '연동됨';
  } else {
    msgEl.className = 'msg error'; msgEl.textContent = 'URL을 입력하세요.';
  }
}

async function syncToSheet() {
  if (!state.appsScriptUrl) {
    const msgEl = document.getElementById('syncMsg');
    msgEl.className = 'msg error'; msgEl.textContent = 'Apps Script URL을 먼저 설정하세요.';
    return;
  }
  const msgEl = document.getElementById('syncMsg');
  msgEl.className = 'msg success'; msgEl.textContent = '동기화 중...';
  try {
    const res = await fetch(state.appsScriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'syncAll', projects: state.projects, editors: state.editors }),
      mode: 'no-cors'
    });
    msgEl.className = 'msg success'; msgEl.textContent = '동기화 요청 완료!';
  } catch (err) {
    msgEl.className = 'msg error'; msgEl.textContent = '동기화 실패: ' + err.message;
  }
}

async function syncIfConnected() {
  if (!state.appsScriptUrl) return;
  try {
    await fetch(state.appsScriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'syncAll', projects: state.projects, editors: state.editors }),
      mode: 'no-cors'
    });
  } catch (e) { /* silent */ }
}

function exportData() {
  const data = { projects: state.projects, editors: state.editors, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `기획현황_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.projects) state.projects = data.projects;
      if (data.editors) state.editors = data.editors;
      saveData();
      renderBoard();
      updateFilters();
      alert('가져오기 완료!');
    } catch (err) {
      alert('잘못된 파일 형식입니다.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function init() {
  loadData();
  const savedRole = sessionStorage.getItem('role');
  if (savedRole === 'admin' && localStorage.getItem('admin_pw_hash')) {
    state.role = 'admin';
    showApp();
  } else if (savedRole === 'editor') {
    state.editorName = sessionStorage.getItem('editorName');
    if (state.editorName && state.editors.includes(state.editorName)) {
      state.role = 'editor';
      showApp();
    }
  }
  if (!state.appsScriptUrl) {
    document.getElementById('syncDot').classList.add('offline');
    document.getElementById('syncText').textContent = '로컬';
  } else {
    document.getElementById('syncText').textContent = '연동됨';
  }
  populateEditorSelect();
}

init();
</script>
</body>
