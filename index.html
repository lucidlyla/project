<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기획 진행 현황</title>
<style>
:root{--bg:#fff;--bg2:#f7f7f5;--surface:#fff;--surface2:#f1f1ef;--border:#e8e8e5;--text:#37352f;--text2:#787774;--text3:#9b9a97;--blue:#2383e2;--blue-light:#e8f0fe;--green:#0f7b6c;--green-bg:#dbeddb;--red:#e03e3e;--red-bg:#fbe4e4;--radius:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.login-overlay{position:fixed;inset:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px;width:100%;max-width:380px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.login-card h1{font-size:22px;margin-bottom:4px;font-weight:700}
.login-card .sub{color:var(--text2);font-size:14px;margin-bottom:28px}
.login-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border)}
.login-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border:none;border-bottom:2px solid transparent;color:var(--text3);background:none}
.login-tab.active{color:var(--text);border-bottom-color:var(--text)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;color:var(--text)}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(35,131,226,.12)}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1b6ec2}
.btn-f{width:100%;justify-content:center}
.btn-s{padding:5px 10px;font-size:13px}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:var(--surface2)}
.msg{margin-top:10px;padding:8px 10px;border-radius:var(--radius);font-size:13px;display:none}
.msg.error{display:block;background:var(--red-bg);color:var(--red)}
.msg.success{display:block;background:var(--green-bg);color:var(--green)}

/* Header */
.hdr{padding:20px 32px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:20px;font-weight:700}
.hdr-r{display:flex;align-items:center;gap:8px}
.ubadge{background:var(--blue-light);color:var(--blue);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:500}
.toolbar{padding:16px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;width:200px;outline:none;color:var(--text)}
.sbox:focus{border-color:var(--blue)}

/* Table */
.tbl-wrap{padding:0 32px 32px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1100px}
thead th{text-align:center;font-size:12px;font-weight:600;color:var(--text2);padding:8px 6px;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--bg);z-index:2}
thead th:first-child,thead th:nth-child(2){text-align:left;padding-left:10px}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg2)}
tbody tr.drag-over-row{border-top:2px solid var(--blue)}
tbody tr.dragging-row{opacity:.4}
td{padding:7px 6px;font-size:13px;white-space:nowrap;vertical-align:middle;text-align:center;height:38px}
td.title-cell{font-weight:500;min-width:140px;cursor:pointer;text-align:left;padding-left:10px}
td.title-cell:hover{color:var(--blue)}
tbody tr{cursor:grab}
tbody tr:active{cursor:grabbing}
td.author-cell{color:var(--text2);min-width:70px;text-align:left}
td.date-cell{text-align:center;min-width:90px;cursor:pointer;position:relative}
td.date-cell .dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);display:inline-block}
td.date-cell .dt{background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:3px;font-size:12px;font-weight:500;display:inline-block}
td.act-cell{text-align:center;width:30px}
td.act-cell button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px}
td.act-cell button:hover{color:var(--red)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:10px;padding:28px;width:100%;max-width:440px;box-shadow:0 8px 30px rgba(0,0,0,.12);max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;margin-bottom:18px;font-weight:600}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* Settings */
.sp{position:fixed;top:0;right:-400px;width:400px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:500;transition:right .25s;display:flex;flex-direction:column}
.sp.open{right:0}
.sp-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sp-hdr h2{font-size:15px;font-weight:600}
.sp-body{flex:1;overflow-y:auto;padding:18px}
.sp-sec{margin-bottom:24px}
.sp-sec h3{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ed-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--bg2);border-radius:var(--radius);margin-bottom:3px;font-size:13px}
.ed-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px}
.sp-ov{position:fixed;inset:0;background:rgba(0,0,0,.12);z-index:499;display:none}
.sp-ov.show{display:block}

/* Date input popover */
.dp{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;display:none}
.dp.show{display:block}
.dp input{font-size:13px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);width:120px}
.dp button{margin-top:4px;font-size:12px}

@media(max-width:768px){.hdr,.toolbar,.tbl-wrap{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h1>기획 진행 현황</h1>
    <p class="sub">출판 기획 파이프라인 관리</p>
    <div class="login-tabs">
      <button class="login-tab active" onclick="swTab('admin')">관리자</button>
      <button class="login-tab" onclick="swTab('editor')">편집자</button>
    </div>
    <div id="aForm">
      <div class="fg"><label>비밀번호</label><input type="password" id="loginPw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-p btn-f" onclick="doLogin()">로그인</button>
    </div>
    <div id="eForm" style="display:none">
      <div class="fg"><label>이름</label><select id="edSel"><option value="">선택</option></select></div>
      <button class="btn btn-p btn-f" onclick="doEdLogin()">로그인</button>
    </div>
    <div id="loginMsg" class="msg"></div>
    <div style="text-align:center;margin-top:18px"><a href="setup.html" style="color:var(--text3);font-size:12px;text-decoration:none">초기 설정</a></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <h1>기획 진행 현황</h1>
    <div class="hdr-r">
      <span class="ubadge" id="uBadge">관리자</span>
      <button class="btn btn-g btn-s" id="setBtn" onclick="openSP()">설정</button>
      <button class="btn btn-g btn-s" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="toolbar">
    <input class="sbox" id="sBox" placeholder="검색" oninput="render()">
    <button class="btn btn-p btn-s" id="addBtn" onclick="openAdd()">+ 새 기획</button>
    <button class="btn btn-g btn-s" onclick="exportJSON()">내보내기</button>
    <button class="btn btn-g btn-s" onclick="document.getElementById('impF').click()">가져오기</button>
    <input type="file" id="impF" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="projModal">
  <div class="modal">
    <h2 id="mTitle">새 기획</h2>
    <input type="hidden" id="mId">
    <div class="fg"><label>기획(가제)</label><input id="mName"></div>
    <div class="fg"><label>저자</label><input id="mAuthor"></div>
    <div id="mStagesArea"></div>
    <div class="modal-foot">
      <button class="btn btn-g" onclick="closeModal()">취소</button>
      <button class="btn btn-p" onclick="saveProj()">저장</button>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="sp-ov" id="spOv" onclick="closeSP()"></div>
<div class="sp" id="spPanel">
  <div class="sp-hdr"><h2>설정</h2><button class="btn btn-g btn-s" onclick="closeSP()">✕</button></div>
  <div class="sp-body">
    <div class="sp-sec">
      <h3>편집자 관리</h3>
      <div id="edList"></div>
      <div style="display:flex;gap:4px;margin-top:6px">
        <input id="newEd" placeholder="이름" style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none">
        <button class="btn btn-p btn-s" onclick="addEd()">추가</button>
      </div>
    </div>
    <div class="sp-sec">
      <h3>비밀번호 변경</h3>
      <div class="fg"><label>현재</label><input type="password" id="cpw"></div>
      <div class="fg"><label>새 비밀번호</label><input type="password" id="npw"></div>
      <div class="fg"><label>확인</label><input type="password" id="npw2"></div>
      <button class="btn btn-p btn-s" onclick="chPw()">변경</button>
      <div id="pwMsg" class="msg" style="margin-top:6px"></div>
    </div>
    <div class="sp-sec">
      <h3>Google Sheets 연동</h3>
      <div class="fg"><label>Apps Script URL</label><input id="gsUrl" placeholder="https://script.google.com/..."></div>
      <button class="btn btn-p btn-s" onclick="saveGS()">저장</button>
      <button class="btn btn-g btn-s" style="margin-left:4px" onclick="syncGS()">동기화</button>
      <div id="gsMsg" class="msg" style="margin-top:6px"></div>
    </div>
  </div>
</div>

<script>
const STAGES=['아이디어','기획 제안','샘플원고 작성','계약서 초안검토','계약 완료','집필 시작','초고','탈고','출간 완료'];
const ST_KEYS=['idea','proposal','sample','contract_review','contract_done','writing_start','draft','final','published'];

let S={role:null,edName:null,projects:[],editors:[],gsUrl:''};

// Default data
const DEFAULT_DATA=[
{title:'미역의 효능',author:'임은비',stages:{contract_done:'25/4/13',final:'26/2/15'}},
{title:'한국사 이상현상',author:'최인서',stages:{contract_done:'25/12/17',final:'26/3/1'}},
{title:'기화',author:'소서림',stages:{contract_done:'25/4/10',final:'26/3/15'}},
{title:'연화의 문',author:'고혜원',stages:{contract_done:'25/5/20',final:'26/3/30'}},
{title:'요즘 세계사 2',author:'임소미',stages:{draft:'25/12/29'}},
{title:'이경 이야기',author:'박에스더',stages:{contract_done:'25/8/18',draft:'26/3/12'}},
{title:'조용한 사람',author:'이재은',stages:{draft:'26/4/14'}},
{title:'요즘 어른 AI',author:'권서림',stages:{proposal:'26/2/25',sample:'26/3/15',contract_review:'26/3/16',draft:'26/4/16'}},
{title:'여름 일본 광고',author:'이시은',stages:{proposal:'26/2/10',sample:'26/3/30',draft:'26/5/15'}},
{title:'과학 괴담회',author:'이광렬',stages:{sample:'26/2/2',draft:'26/6/23'}},
{title:'단백 공복',author:'장일영',stages:{sample:'26/3/12',contract_review:'26/3/15',contract_done:'26/3/15',draft:'26/6/29'}},
{title:'아이돌 바디호러',author:'설재인',stages:{contract_done:'25/7/16',draft:'26/6/29'}},
{title:'천년교습소',author:'배명은',stages:{contract_done:'25/4/20',draft:'26/7/29'}},
{title:'임시 서스펜스',author:'설재인',stages:{contract_done:'25/7/16',draft:'26/12/29'}},
{title:'사랑 허락 말 것',author:'김달',stages:{contract_done:'24/1/9'}},
{title:'별별역사 전쟁사',author:'김도형',stages:{contract_done:'26/2/25'}},
{title:'10대 첫 세계미술관',author:'김영숙',stages:{proposal:'25/12/29',sample:'26/3/31'}},
{title:'이상한 맞춤범',author:'이주윤',stages:{contract_done:'25/11/30'}},
{title:'클로드 실용서',author:'권서림',stages:{idea:'26/3/16'}}
];

async function sha256(t){const e=new TextEncoder().encode(t);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

function swTab(t){document.querySelectorAll('.login-tab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('aForm').style.display=t==='admin'?'block':'none';document.getElementById('eForm').style.display=t==='editor'?'block':'none';document.getElementById('loginMsg').className='msg';if(t==='editor')popEdSel()}
function popEdSel(){const s=document.getElementById('edSel');s.innerHTML='<option value="">선택</option>';S.editors.forEach(e=>{s.innerHTML+=`<option value="${e}">${e}</option>`})}

async function doLogin(){const pw=document.getElementById('loginPw').value;const h=localStorage.getItem('admin_pw_hash');if(!h){showLM('error','초기 설정이 필요합니다.');return}const hash=await sha256(pw);if(hash===h){S.role='admin';sessionStorage.setItem('role','admin');showApp()}else showLM('error','비밀번호가 틀렸습니다.')}
function doEdLogin(){const n=document.getElementById('edSel').value;if(!n){showLM('error','편집자를 선택하세요.');return}S.role='editor';S.edName=n;sessionStorage.setItem('role','editor');sessionStorage.setItem('edName',n);showApp()}
function logout(){sessionStorage.clear();S.role=null;S.edName=null;document.getElementById('app').style.display='none';document.getElementById('loginOverlay').style.display='flex'}
function showLM(t,m){const e=document.getElementById('loginMsg');e.className='msg '+t;e.textContent=m}

function showApp(){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('app').style.display='block';
  const a=S.role==='admin';
  document.getElementById('uBadge').textContent=a?'관리자':S.edName;
  document.getElementById('setBtn').style.display=a?'':'none';
  document.getElementById('addBtn').style.display=a?'':'none';
  render();
}

function load(){
  try{
    let p=JSON.parse(localStorage.getItem('projects')||'null');
    if(!p||!p.length){p=DEFAULT_DATA.map((d,i)=>({id:'p_'+i,...d}));localStorage.setItem('projects',JSON.stringify(p))}
    S.projects=p;
    S.editors=JSON.parse(localStorage.getItem('editors')||'[]');
    S.gsUrl=localStorage.getItem('gsUrl')||'';
  }catch(e){S.projects=[];S.editors=[]}
}
function save(){localStorage.setItem('projects',JSON.stringify(S.projects));localStorage.setItem('editors',JSON.stringify(S.editors))}
function gid(){return 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}

// Sort: by furthest stage desc, then by earliest date in that stage
function sortProjects(arr){
  return arr.slice().sort((a,b)=>{
    const aIdx=getMaxStage(a), bIdx=getMaxStage(b);
    if(aIdx!==bIdx) return bIdx-aIdx; // furthest stage first
    // same stage → earlier date first
    const aDate=parseD(((a.stages||{})[ST_KEYS[aIdx]])||''), bDate=parseD(((b.stages||{})[ST_KEYS[bIdx]])||'');
    return aDate-bDate;
  });
}
function getMaxStage(p){
  const stg=p.stages||{};
  let mx=-1;
  ST_KEYS.forEach((k,i)=>{if(stg[k])mx=i});
  return mx;
}
function parseD(s){
  if(!s)return 99999999;
  const parts=s.split('/').map(Number);
  if(parts.length<3)return 99999999;
  const y=parts[0]<100?parts[0]+2000:parts[0];
  return y*10000+(parts[1]||0)*100+(parts[2]||0);
}

function render(){
  const q=document.getElementById('sBox').value.toLowerCase();
  const th=document.getElementById('thead');
  const isA=S.role==='admin';
  th.innerHTML='<th>기획(가제)</th><th>저자</th>'+STAGES.map(s=>`<th>${s}</th>`).join('')+(isA?'<th></th>':'');
  const tb=document.getElementById('tbody');
  let rows=sortProjects(S.projects);
  if(q)rows=rows.filter(p=>p.title.toLowerCase().includes(q)||p.author.toLowerCase().includes(q));
  tb.innerHTML=rows.map(p=>{
    const stg=p.stages||{};
    return `<tr draggable="${isA}" data-id="${p.id}" ondragstart="rowDS(event)" ondragover="rowDO(event)" ondragleave="rowDL(event)" ondrop="rowDR(event)" ondragend="rowDE(event)">
      <td class="title-cell" onclick="openEdit('${p.id}')">${esc(p.title)}</td>
      <td class="author-cell">${esc(p.author)}</td>
      ${ST_KEYS.map(k=>{
        const v=stg[k];
        return `<td class="date-cell" onclick="cellClick(event,'${p.id}','${k}')">${v?`<span class="dt">${esc(v)}</span>`:'<span class="dot"></span>'}</td>`;
      }).join('')}
      ${isA?`<td class="act-cell"><button onclick="delProj('${p.id}')" title="삭제">✕</button></td>`:''}
    </tr>`;
  }).join('');
}

// Row drag & drop reorder
let dragRowId=null;
function rowDS(e){dragRowId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging-row');e.dataTransfer.effectAllowed='move'}
function rowDO(e){e.preventDefault();const tr=e.currentTarget;tr.classList.add('drag-over-row')}
function rowDL(e){e.currentTarget.classList.remove('drag-over-row')}
function rowDE(e){e.currentTarget.classList.remove('dragging-row');document.querySelectorAll('.drag-over-row').forEach(r=>r.classList.remove('drag-over-row'))}
function rowDR(e){
  e.preventDefault();
  const targetId=e.currentTarget.dataset.id;
  e.currentTarget.classList.remove('drag-over-row');
  if(!dragRowId||dragRowId===targetId)return;
  const fromIdx=S.projects.findIndex(p=>p.id===dragRowId);
  const toIdx=S.projects.findIndex(p=>p.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const item=S.projects.splice(fromIdx,1)[0];
  S.projects.splice(toIdx,0,item);
  save();render();
  dragRowId=null;
}

// Inline date editing
let activePop=null;
function cellClick(ev,pid,key){
  ev.stopPropagation();
  if(activePop){activePop.remove();activePop=null}
  if(S.role!=='admin')return;
  const td=ev.currentTarget;
  const p=S.projects.find(x=>x.id===pid);
  if(!p)return;
  if(!p.stages)p.stages={};
  const cur=p.stages[key]||'';
  const pop=document.createElement('div');
  pop.className='dp show';
  pop.innerHTML=`<input type="text" value="${cur}" placeholder="YY/M/D" style="font-size:13px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);width:100px">
    <div style="display:flex;gap:4px;margin-top:4px">
      <button class="btn btn-p btn-s" onclick="saveDatePop(this,'${pid}','${key}')">확인</button>
      ${cur?`<button class="btn btn-g btn-s" onclick="clearDatePop(this,'${pid}','${key}')">삭제</button>`:''}
    </div>`;
  td.style.position='relative';
  td.appendChild(pop);
  pop.querySelector('input').focus();
  pop.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')saveDatePop(pop.querySelector('button'),pid,key);if(e.key==='Escape'){pop.remove();activePop=null}});
  activePop=pop;
}
document.addEventListener('click',()=>{if(activePop){activePop.remove();activePop=null}});

function saveDatePop(btn,pid,key){
  const pop=btn.closest('.dp');
  const val=pop.querySelector('input').value.trim();
  const p=S.projects.find(x=>x.id===pid);
  if(p){if(!p.stages)p.stages={};if(val)p.stages[key]=val;else delete p.stages[key];save();render()}
  pop.remove();activePop=null;
}

async function sha256(t){const e=new TextEncoder().encode(t);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

function load(){
  try{

function gid(){return 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}

// Sort: by furthest stage desc, then by earliest date in that stage
function sortProjects(arr){
  return arr.slice().sort((a,b)=>{
    const aIdx=getMaxStage(a), bIdx=getMaxStage(b);
    if(aIdx!==bIdx) return bIdx-aIdx; // furthest stage first
    // same stage → earlier date first
    const aDate=parseD(((a.stages||{})[ST_KEYS[aIdx]])||''), bDate=parseD(((b.stages||{})[ST_KEYS[bIdx]])||'');
    return aDate-bDate;
  });
}
function getMaxStage(p){
  const stg=p.stages||{};
  let mx=-1;
  ST_KEYS.forEach((k,i)=>{if(stg[k])mx=i});
  return mx;
}
function parseD(s){
  if(!s)return 99999999;
  const parts=s.split('/').map(Number);
  if(parts.length<3)return 99999999;
  const y=parts[0]<100?parts[0]+2000:parts[0];
  return y*10000+(parts[1]||0)*100+(parts[2]||0);
}

  const tb=document.getElementById('tbody');
  let rows=sortProjects(S.projects);
  if(q)rows=rows.filter(p=>p.title.toLowerCase().includes(q)||p.author.toLowerCase().includes(q));
  tb.innerHTML=rows.map(p=>{
    const stg=p.stages||{};
    return `<tr draggable="${isA}" data-id="${p.id}" ondragstart="rowDS(event)" ondragover="rowDO(event)" ondragleave="rowDL(event)" ondrop="rowDR(event)" ondragend="rowDE(event)">
      <td class="title-cell" onclick="openEdit('${p.id}')">${esc(p.title)}</td>

  }).join('');
}

// Row drag & drop reorder
let dragRowId=null;
function rowDS(e){dragRowId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging-row');e.dataTransfer.effectAllowed='move'}
function rowDO(e){e.preventDefault();const tr=e.currentTarget;tr.classList.add('drag-over-row')}
function rowDL(e){e.currentTarget.classList.remove('drag-over-row')}
function rowDE(e){e.currentTarget.classList.remove('dragging-row');document.querySelectorAll('.drag-over-row').forEach(r=>r.classList.remove('drag-over-row'))}
function rowDR(e){
  e.preventDefault();
  const targetId=e.currentTarget.dataset.id;
  e.currentTarget.classList.remove('drag-over-row');
  if(!dragRowId||dragRowId===targetId)return;
  const fromIdx=S.projects.findIndex(p=>p.id===dragRowId);
  const toIdx=S.projects.findIndex(p=>p.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const item=S.projects.splice(fromIdx,1)[0];
  S.projects.splice(toIdx,0,item);
  save();render();
  dragRowId=null;
}

    </div>`;

  pop.querySelector('input').focus();

}

  ['cpw','npw','npw2'].forEach(i=>document.getElementById(i).value='');
}

function saveGS(){S.gsUrl=document.getElementById('gsUrl').value.trim();localStorage.setItem('gsUrl',S.gsUrl);const m=document.getElementById('gsMsg');m.className='msg success';m.textContent='저장됨'}
async function syncGS(){if(!S.gsUrl){document.getElementById('gsMsg').className='msg error';document.getElementById('gsMsg').textContent='URL 필요';return}try{await fetch(S.gsUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'syncAll',projects:S.projects,editors:S.editors}),mode:'no-cors'});document.getElementById('gsMsg').className='msg success';document.getElementById('gsMsg').textContent='완료'}catch(e){document.getElementById('gsMsg').className='msg error';document.getElementById('gsMsg').textContent='실패'}}

function exportJSON(){const b=new Blob([JSON.stringify({projects:S.projects,editors:S.editors},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='기획현황.json';a.click()}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.projects)S.projects=d.projects;if(d.editors)S.editors=d.editors;save();render();alert('완료')}catch(err){alert('오류')}};r.readAsText(f);e.target.value=''}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function init(){
  load();
  const r=sessionStorage.getItem('role');
  if(r==='admin'&&localStorage.getItem('admin_pw_hash')){S.role='admin';showApp()}
  else if(r==='editor'){S.edName=sessionStorage.getItem('edName');if(S.edName&&S.editors.includes(S.edName)){S.role='editor';showApp()}}
  popEdSel();
}
init();
</script>
</body>
