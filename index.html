<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기획 진행 현황</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f5f5f5; color:#333; font-size:14px; }

  /* ─── Login ─── */
  .login-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:9999; }
  .login-box { background:#fff; border-radius:12px; padding:40px 36px; width:360px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.15); }
  .login-box h2 { margin-bottom:8px; font-size:20px; }
  .login-box p { color:#888; font-size:13px; margin-bottom:24px; }
  .login-box input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; margin-bottom:12px; outline:none; }
  .login-box input:focus { border-color:#4a7c59; }
  .login-box button { width:100%; padding:12px; background:#4a7c59; color:#fff; border:none; border-radius:8px; font-size:15px; cursor:pointer; font-weight:600; }
  .login-box button:hover { background:#3d6b4b; }
  .login-error { color:#e74c3c; font-size:12px; margin-bottom:8px; }

  /* ─── Header ─── */
  .header { background:#fff; border-bottom:1px solid #e0e0e0; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:18px; font-weight:700; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .header-right .role-badge { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; }
  .role-badge.admin { background:#e8f5e9; color:#2e7d32; }
  .role-badge.editor { background:#e3f2fd; color:#1565c0; }
  .btn-sm { padding:6px 14px; border:1px solid #ddd; border-radius:6px; background:#fff; font-size:12px; cursor:pointer; }
  .btn-sm:hover { background:#f5f5f5; }
  .btn-primary { background:#4a7c59; color:#fff; border:none; }
  .btn-primary:hover { background:#3d6b4b; }
  .btn-danger { color:#e74c3c; border-color:#e74c3c; }
  .btn-danger:hover { background:#fdecea; }

  /* ─── Main ─── */
  .main { max-width:1200px; margin:24px auto; padding:0 24px; }

  /* ─── Pipeline ─── */
  .pipeline { background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:20px 24px; margin-bottom:20px; }
  .pipeline h3 { font-size:14px; font-weight:700; margin-bottom:14px; }
  .pipeline-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:8px; }
  .pipe-item { text-align:center; padding:12px 4px; border:1px solid #e0e0e0; border-radius:6px; }
  .pipe-item .count { font-size:22px; font-weight:700; color:#4a7c59; }
  .pipe-item .label { font-size:10px; color:#888; margin-top:4px; }

  /* ─── Table ─── */
  .table-section { background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:20px 24px; }
  .table-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .table-header h3 { font-size:14px; font-weight:700; }
  .table-header-right { display:flex; gap:8px; align-items:center; }
  .search-input { padding:6px 12px; border:1px solid #ddd; border-radius:6px; font-size:12px; width:180px; outline:none; }
  .search-input:focus { border-color:#4a7c59; }

  table { width:100%; border-collapse:collapse; }
  thead th { font-size:11px; color:#888; font-weight:600; padding:8px 6px; border-bottom:2px solid #e0e0e0; text-align:center; white-space:nowrap; }
  tbody td { padding:6px; text-align:center; border-bottom:1px solid #f0f0f0; font-size:13px; }
  tbody tr:hover { background:#f9faf9; }
  .cell-title { text-align:left; font-weight:600; min-width:100px; }
  .cell-author { text-align:left; min-width:60px; }
  .cell-title input, .cell-author input { border:none; background:transparent; font-size:13px; width:100%; outline:none; padding:2px 4px; }
  .cell-title input:focus, .cell-author input:focus { background:#f0f7f2; border-radius:4px; }
  .cell-title input { font-weight:600; }

  .stage-circle { width:18px; height:18px; border:2px solid #ccc; border-radius:50%; display:inline-block; cursor:pointer; vertical-align:middle; }
  .stage-circle.filled { background:#4a7c59; border-color:#4a7c59; }
  .stage-date { font-size:10px; color:#888; display:block; margin-top:2px; white-space:nowrap; }

  .delete-btn { color:#ccc; cursor:pointer; font-size:16px; border:none; background:none; }
  .delete-btn:hover { color:#e74c3c; }

  /* ─── Sync ─── */
  .sync-status { font-size:11px; color:#888; }
  .sync-status.syncing { color:#f39c12; }
  .sync-status.error { color:#e74c3c; }
  .sync-status.ok { color:#27ae60; }

  /* ─── Settings Modal ─── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:9998; }
  .modal { background:#fff; border-radius:12px; padding:32px; width:480px; max-height:80vh; overflow-y:auto; }
  .modal h3 { margin-bottom:20px; font-size:16px; }
  .modal label { display:block; font-size:12px; font-weight:600; color:#666; margin-bottom:4px; margin-top:14px; }
  .modal input[type="text"], .modal input[type="password"] { width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:13px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:24px; }
  .user-list { margin-top:12px; }
  .user-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
  .user-item select { padding:4px 8px; border:1px solid #ddd; border-radius:4px; font-size:12px; }

  /* ─── Responsive ─── */
  @media(max-width:900px) {
    .pipeline-grid { grid-template-columns:repeat(3,1fr); }
    .main { padding:0 12px; }
    table { font-size:12px; }
  }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; background:#333; color:#fff; padding:12px 20px; border-radius:8px; font-size:13px; z-index:9999; opacity:0; transition:opacity .3s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ═══════════════════════════════════════════
   CONFIG - 사이트 설정
   Google Apps Script URL을 여기에 입력하세요
   ═══════════════════════════════════════════ */
const CONFIG = {
  APPS_SCRIPT_URL: "",  // ← 여기에 배포된 Apps Script URL 입력
  SYNC_DEBOUNCE: 2000,
  SITE_TITLE: "기획 진행 현황",
};

const STAGES = [
  "아이디어","기획 제안","샘플원고 작성","계약서 초안검토",
  "계약 완료","집필 시작","초고","탈고","출간 완료"
];

const TODAY = new Date().toISOString().slice(0,10);

/* ─── Utility ─── */
const formatDate = (d) => {
  if(!d) return "";
  const [y,m,dd] = d.split("-");
  return `${y.slice(2)}/${m}/${dd}`;
};

async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ─── API Helper ─── */
async function apiFetch(action, token) {
  if(!CONFIG.APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=${action}&token=${token}`);
    return await res.json();
  } catch(e) { console.error("Fetch error:", e); return null; }
}

async function apiPost(body, token) {
  if(!CONFIG.APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain"},
      body: JSON.stringify({...body, token})
    });
    return await res.json();
  } catch(e) { console.error("Post error:", e); return null; }
}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */
function App() {
  /* ─── Auth State ─── */
  const [authed, setAuthed] = useState(false);
  const [currentUser, setCurrentUser] = useState(null); // {name, role}
  const [loginPw, setLoginPw] = useState("");
  const [loginName, setLoginName] = useState("");
  const [loginError, setLoginError] = useState("");

  /* ─── Data State ─── */
  const [projects, setProjects] = useState([]);
  const [users, setUsers] = useState([]);
  const [settings, setSettings] = useState({ adminPwHash:"", editorPwHash:"" });
  const [search, setSearch] = useState("");
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|syncing|ok|error
  const [showSettings, setShowSettings] = useState(false);
  const [toast, setToast] = useState("");

  const syncTimer = useRef(null);
  const dataLoaded = useRef(false);

  /* ─── Toast ─── */
  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2500);
  };

  /* ─── Auth ─── */
  const handleLogin = async () => {
    if(!loginName.trim()) { setLoginError("이름을 입력하세요"); return; }
    if(!loginPw) { setLoginError("비밀번호를 입력하세요"); return; }

    const hash = await sha256(loginPw);

    // 먼저 시트에서 설정 가져오기
    if(CONFIG.APPS_SCRIPT_URL) {
      const res = await apiFetch("readSettings", "");
      if(res && res.success) {
        const s = res.data;
        if(hash === s.adminPwHash) {
          setCurrentUser({ name: loginName, role: "admin" });
          setSettings(s);
          setAuthed(true);
          sessionStorage.setItem("pipeline_auth", JSON.stringify({ name:loginName, role:"admin", hash }));
          loadData("admin", hash);
          return;
        }
        if(hash === s.editorPwHash) {
          // 편집자 이름이 등록되어 있는지 확인
          const userList = res.data.users || [];
          const found = userList.find(u => u.name === loginName.trim());
          if(found) {
            setCurrentUser({ name: loginName, role: "editor" });
            setSettings(s);
            setUsers(userList);
            setAuthed(true);
            sessionStorage.setItem("pipeline_auth", JSON.stringify({ name:loginName, role:"editor", hash }));
            loadData("editor", hash);
            return;
          } else {
            setLoginError("등록되지 않은 편집자입니다. 관리자에게 문의하세요.");
            return;
          }
        }
        setLoginError("비밀번호가 일치하지 않습니다");
        return;
      }
    }

    // Apps Script 미설정 시: 로컬 모드
    setCurrentUser({ name: loginName, role: "admin" });
    setAuthed(true);
    showToast("로컬 모드로 실행 중 (Google Sheets 미연결)");
    const saved = localStorage.getItem("pipeline_projects");
    if(saved) setProjects(JSON.parse(saved));
    dataLoaded.current = true;
  };

  // 세션 복원
  useEffect(() => {
    const saved = sessionStorage.getItem("pipeline_auth");
    if(saved) {
      try {
        const { name, role, hash } = JSON.parse(saved);
        setCurrentUser({ name, role });
        setAuthed(true);
        loadData(role, hash);
      } catch(e) {}
    }
  }, []);

  const loadData = async (role, hash) => {
    if(!CONFIG.APPS_SCRIPT_URL) {
      const saved = localStorage.getItem("pipeline_projects");
      if(saved) setProjects(JSON.parse(saved));
      dataLoaded.current = true;
      return;
    }
    setSyncStatus("syncing");
    const res = await apiFetch("readAll", hash);
    if(res && res.success) {
      setProjects(res.data.projects || []);
      setUsers(res.data.users || []);
      setSettings(res.data.settings || {});
      setSyncStatus("ok");
      dataLoaded.current = true;
    } else {
      setSyncStatus("error");
      showToast("데이터 로드 실패");
    }
  };

  const handleLogout = () => {
    setAuthed(false);
    setCurrentUser(null);
    setProjects([]);
    sessionStorage.removeItem("pipeline_auth");
  };

  /* ─── Sync to Sheets (debounced) ─── */
  const syncToSheets = useCallback(async (data) => {
    if(!CONFIG.APPS_SCRIPT_URL || !dataLoaded.current) return;
    setSyncStatus("syncing");
    const auth = sessionStorage.getItem("pipeline_auth");
    const token = auth ? JSON.parse(auth).hash : "";
    const res = await apiPost({ action:"writeProjects", data }, token);
    if(res && res.success) {
      setSyncStatus("ok");
    } else {
      setSyncStatus("error");
    }
  }, []);

  useEffect(() => {
    if(!dataLoaded.current) return;
    // 로컬 백업
    localStorage.setItem("pipeline_projects", JSON.stringify(projects));
    // 시트 동기화 (디바운스)
    if(syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => syncToSheets(projects), CONFIG.SYNC_DEBOUNCE);
  }, [projects, syncToSheets]);

  /* ─── Pipeline Counts ─── */
  const pipelineCounts = useMemo(() => {
    const c = Object.fromEntries(STAGES.map(s => [s, 0]));
    projects.forEach(p => {
      const ls = [...STAGES].reverse().find(s => p.stages[s]);
      if(ls) c[ls] += 1;
    });
    return c;
  }, [projects]);

  /* ─── Filtered Projects ─── */
  const filtered = useMemo(() => {
    if(!search.trim()) return projects;
    const q = search.toLowerCase();
    return projects.filter(p =>
      p.title.toLowerCase().includes(q) || p.author.toLowerCase().includes(q)
    );
  }, [projects, search]);

  /* ─── Project CRUD ─── */
  const addProject = () => {
    if(currentUser?.role === "editor") {
      showToast("기획 추가는 관리자만 가능합니다");
      return;
    }
    const nid = projects.length ? Math.max(...projects.map(p=>p.id))+1 : 1;
    setProjects(prev => [...prev, {
      id: nid,
      title: "새 기획",
      author: "",
      stages: Object.fromEntries(STAGES.map(s => [s, ""]))
    }]);
  };

  const deleteProject = (pid) => {
    if(currentUser?.role === "editor") {
      showToast("기획 삭제는 관리자만 가능합니다");
      return;
    }
    if(!confirm("이 기획을 삭제하시겠습니까?")) return;
    setProjects(prev => prev.filter(p => p.id !== pid));
  };

  const updateField = (pid, field, value) => {
    setProjects(prev => prev.map(p =>
      p.id !== pid ? p : { ...p, [field]: value }
    ));
  };

  const toggleStage = (pid, stage) => {
    // 편집자는 자기 담당만 수정 가능
    if(currentUser?.role === "editor") {
      const proj = projects.find(p => p.id === pid);
      if(proj && proj.author !== currentUser.name) {
        showToast("본인 담당 기획만 수정할 수 있습니다");
        return;
      }
    }
    setProjects(prev => prev.map(p =>
      p.id !== pid ? p : {
        ...p,
        stages: { ...p.stages, [stage]: p.stages[stage] ? "" : TODAY }
      }
    ));
  };

  /* ─── Settings ─── */
  const [newAdminPw, setNewAdminPw] = useState("");
  const [newEditorPw, setNewEditorPw] = useState("");
  const [newUserName, setNewUserName] = useState("");

  const saveSettings = async () => {
    const s = { ...settings };
    if(newAdminPw) s.adminPwHash = await sha256(newAdminPw);
    if(newEditorPw) s.editorPwHash = await sha256(newEditorPw);

    if(CONFIG.APPS_SCRIPT_URL) {
      const auth = sessionStorage.getItem("pipeline_auth");
      const token = auth ? JSON.parse(auth).hash : "";
      await apiPost({ action:"writeSettings", data: { settings: s, users } }, token);
    }
    setSettings(s);
    setNewAdminPw("");
    setNewEditorPw("");
    showToast("설정이 저장되었습니다");
  };

  const addUser = () => {
    if(!newUserName.trim()) return;
    if(users.find(u => u.name === newUserName.trim())) {
      showToast("이미 등록된 이름입니다");
      return;
    }
    setUsers(prev => [...prev, { name: newUserName.trim(), role: "editor" }]);
    setNewUserName("");
  };

  const removeUser = (name) => {
    setUsers(prev => prev.filter(u => u.name !== name));
  };

  /* ─── Render ─── */
  if(!authed) {
    return (
      <div className="login-overlay">
        <div className="login-box">
          <h2>기획 진행 현황</h2>
          <p>편집부 전용 시스템입니다</p>
          {loginError && <div className="login-error">{loginError}</div>}
          <input
            placeholder="이름"
            value={loginName}
            onChange={e => setLoginName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
          />
          <input
            type="password"
            placeholder="비밀번호"
            value={loginPw}
            onChange={e => setLoginPw(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
          />
          <button onClick={handleLogin}>로그인</button>
          {!CONFIG.APPS_SCRIPT_URL && (
            <p style={{marginTop:12,fontSize:11,color:'#f39c12'}}>
              ⚠ Google Sheets 미연결 (로컬 모드)
            </p>
          )}
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <h1>{CONFIG.SITE_TITLE}</h1>
        <div className="header-right">
          <span className={`sync-status ${syncStatus}`}>
            {syncStatus === 'syncing' ? '동기화 중...' :
             syncStatus === 'ok' ? '✓ 동기화 완료' :
             syncStatus === 'error' ? '✕ 동기화 오류' : ''}
          </span>
          <span className={`role-badge ${currentUser?.role}`}>
            {currentUser?.name} ({currentUser?.role === 'admin' ? '관리자' : '편집자'})
          </span>
          {currentUser?.role === 'admin' && (
            <button className="btn-sm" onClick={() => setShowSettings(true)}>설정</button>
          )}
          <button className="btn-sm" onClick={handleLogout}>로그아웃</button>
        </div>
      </div>

      <div className="main">
        {/* Pipeline */}
        <div className="pipeline">
          <h3>기획 파이프라인</h3>
          <div className="pipeline-grid">
            {STAGES.map(s => (
              <div className="pipe-item" key={s}>
                <div className="count">{pipelineCounts[s]}</div>
                <div className="label">{s}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Table */}
        <div className="table-section">
          <div className="table-header">
            <h3>기획 진행 현황</h3>
            <div className="table-header-right">
              <input
                className="search-input"
                placeholder="검색"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              {currentUser?.role === 'admin' && (
                <button className="btn-sm btn-primary" onClick={addProject}>+ 새 기획</button>
              )}
            </div>
          </div>

          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th>기획(가제)</th>
                  <th>저자</th>
                  {STAGES.map(s => <th key={s}>{s}</th>)}
                  {currentUser?.role === 'admin' && <th></th>}
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => (
                  <tr key={p.id}>
                    <td className="cell-title">
                      <input
                        value={p.title}
                        onChange={e => updateField(p.id, 'title', e.target.value)}
                        readOnly={currentUser?.role === 'editor' && p.author !== currentUser.name}
                      />
                    </td>
                    <td className="cell-author">
                      <input
                        value={p.author}
                        onChange={e => updateField(p.id, 'author', e.target.value)}
                        readOnly={currentUser?.role !== 'admin'}
                      />
                    </td>
                    {STAGES.map(s => (
                      <td key={s}>
                        <span
                          className={`stage-circle ${p.stages[s] ? 'filled' : ''}`}
                          onClick={() => toggleStage(p.id, s)}
                        />
                        {p.stages[s] && <span className="stage-date">{formatDate(p.stages[s])}</span>}
                      </td>
                    ))}
                    {currentUser?.role === 'admin' && (
                      <td>
                        <button className="delete-btn" onClick={() => deleteProject(p.id)}>✕</button>
                      </td>
                    )}
                  </tr>
                ))}
                {filtered.length === 0 && (
                  <tr><td colSpan={STAGES.length+3} style={{padding:32,color:'#aaa',textAlign:'center'}}>
                    {search ? '검색 결과가 없습니다' : '기획이 없습니다. 새 기획을 추가하세요.'}
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* Settings Modal (admin only) */}
      {showSettings && currentUser?.role === 'admin' && (
        <div className="modal-overlay" onClick={e => { if(e.target === e.currentTarget) setShowSettings(false); }}>
          <div className="modal">
            <h3>시스템 설정</h3>

            <label>관리자 비밀번호 변경</label>
            <input type="password" placeholder="새 관리자 비밀번호" value={newAdminPw}
              onChange={e => setNewAdminPw(e.target.value)} />

            <label>편집자 비밀번호 변경</label>
            <input type="password" placeholder="새 편집자 비밀번호" value={newEditorPw}
              onChange={e => setNewEditorPw(e.target.value)} />

            <label style={{marginTop:20}}>편집자 목록</label>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <input type="text" placeholder="편집자 이름 추가" value={newUserName}
                onChange={e => setNewUserName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addUser()}
                style={{flex:1}} />
              <button className="btn-sm btn-primary" onClick={addUser}>추가</button>
            </div>
            <div className="user-list">
              {users.map(u => (
                <div className="user-item" key={u.name}>
                  <span style={{flex:1}}>{u.name}</span>
                  <span style={{color:'#888',fontSize:11}}>편집자</span>
                  <button className="btn-sm btn-danger" onClick={() => removeUser(u.name)}>삭제</button>
                </div>
              ))}
              {users.length === 0 && <p style={{color:'#aaa',fontSize:12,padding:8}}>등록된 편집자가 없습니다</p>}
            </div>

            <div className="modal-actions">
              <button className="btn-sm" onClick={() => setShowSettings(false)}>닫기</button>
              <button className="btn-sm btn-primary" onClick={saveSettings}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
